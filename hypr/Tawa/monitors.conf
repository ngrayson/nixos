# Tawa (desktop) — Hyprland outputs + workspace placement.
# Edit with hyprmon: `hyprmon-cfg` (uses `$(hostname)` → this path), then rebuild.
# Other hosts: add `hypr/<hostname>/monitors.conf` only if that machine needs a fixed layout.

monitor=DP-3,2560x1440@59.95100,0x0,1.00,transform,3
monitor=HDMI-A-1,2560x1440@59.95100,1440x544,1.00
monitor=DP-1,2560x1440@59.95100,4000x0,1.00,transform,1

workspace = 1, monitor:DP-3
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:DP-1
